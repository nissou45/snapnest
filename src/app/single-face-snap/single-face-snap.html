<app-card [isSnapped]="userHasSnapped">
  <h2>{{ faceSnap.title | uppercase }}</h2>
  <img [src]="faceSnap.imageUrl" [alt]="faceSnap.title" />
  <p>{{ faceSnap.description }}</p>
  @if (faceSnap.location) {
    <p>📍 {{ faceSnap.location }}</p>
  }
  <p>{{ faceSnap.snaps }} snaps</p>
  
  <div class="button-container">
    <app-button 
      [label]="snapButtonText" 
      buttonType="card" 
      (clicked)="onSnap()">
    </app-button>

    <app-button 
      [label]="uiConstants.BACK" 
      buttonType="card" 
      [routerLink]="'/' + routes.FACE_SNAPS">
    </app-button>
  </div>
</app-card>
